<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
        name="description"
        content="Sign in to Nova+ and continue your Nova Studios streaming experience."
    >

    <title>Sign In | Nova+</title>

    <link rel="stylesheet" href="../css/auth-login.css">
</head>

<body>
    <main class="auth-page">
        <header class="auth-header">
            <a
                href="../index.html"
                class="nova-brand"
                aria-label="Nova Studios home"
            >
                NOVA<span>STUDIOS</span>
            </a>
        </header>

        <section class="auth-content" aria-labelledby="login-title">
            <div class="login-card">
                <div class="nova-plus-mark" aria-hidden="true">
                    NOVA<span>+</span>
                </div>

                <h1 id="login-title">Welcome back</h1>

                <p class="login-subtitle">
                    Sign in to continue watching on Nova+
                </p>

                <form id="loginForm" class="login-form">
                    <div class="form-group">
                        <label for="email">Email address</label>

                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="name@example.com"
                            autocomplete="email"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>

                        <div class="password-field">
                            <input
                                type="password"
                                id="password"
                                name="password"
                                placeholder="Enter your password"
                                autocomplete="current-password"
                                minlength="6"
                                required
                            >

                            <button
                                type="button"
                                id="togglePassword"
                                class="password-toggle"
                                aria-label="Show password"
                                aria-pressed="false"
                            >
                                Show
                            </button>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-option">
                            <input
                                type="checkbox"
                                id="rememberMe"
                                name="rememberMe"
                            >
                            <span>Remember me</span>
                        </label>

                        <a href="#" class="forgot-link">
                            Forgot password?
                        </a>
                    </div>

                    <p
                        id="loginError"
                        class="login-error"
                        role="alert"
                        aria-live="polite"
                    ></p>

                    <button type="submit" class="sign-in-button">
                        Sign In
                    </button>
                </form>

                <p class="signup-text">
                    New to Nova+?
                    <a href="#" id="createAccountLink">
                        Create an account
                    </a>
                </p>

                <p class="auth-note">
                    This Nova+ preview uses a local browser-based
                    authentication experience.
                </p>
            </div>
        </section>

        <footer class="auth-footer">
            <p>&copy; 2026 Nova Studios. All rights reserved.</p>
        </footer>
    </main>

    <script src="../js/auth.js"></script>
</body>
</html>
